<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard - MUST Tracker</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/teacher.css">
</head>

<body>

    <div class="dashboard-container">
        <nav class="sidebar">
            <img src="img/must-logo.png" style="width:60px;margin-bottom:20px;">
            <h3>Teacher Portal</h3>
            <hr style="margin:20px 0;opacity:0.3;">
            <p id="t-name" style="font-weight: bold;">Loading...</p>
            <ul style="list-style:none;margin-top:30px;padding-left:0;">
                <li style="margin-bottom: 15px;"><a href="#profile" style="color: white; text-decoration: none;">My
                        Profile</a></li>
                <li><a href="index.html" style="color:var(--must-gold);text-decoration:none;">Logout</a></li>
            </ul>
        </nav>
        <main class="main-content">
            <header style="margin-bottom: 30px;">
                <h2 style="color:var(--must-blue);">Teacher Verification Dashboard</h2>
            </header>
            <div class="stats-row" id="teacher-stats"></div>

            <div class="card" id="profile" style="margin-bottom: 30px;">
                <h3 style="color: var(--must-blue);">👤 My Profile Settings</h3>
                <form id="updateProfileForm" style="margin-top: 20px;">
                    <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                        <div style="flex: 1; min-width: 200px;"><label>Full Name</label><input type="text"
                                id="prof_name" required
                                style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; margin-top:5px;">
                        </div>
                        <div style="flex: 1; min-width: 200px;"><label>Email Address</label><input type="email"
                                id="prof_email" required
                                style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; margin-top:5px;">
                        </div>
                    </div>
                    <hr style="margin: 20px 0; border-top: 1px solid #eee;">
                    <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                        <div style="flex: 1; min-width: 200px;"><label>Current Password <span
                                    style="color:red">*</span></label><input type="password" id="prof_current_pass"
                                required
                                style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; margin-top:5px;"
                                placeholder="Required to save"></div>
                        <div style="flex: 1; min-width: 200px;"><label>New Password
                                <small>(Optional)</small></label><input type="password" id="prof_new_pass"
                                style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; margin-top:5px;"
                                placeholder="Leave blank to keep current"></div>
                    </div>
                    <button type="submit"
                        style="margin-top: 20px; background-color: #2ecc71; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">Save
                        Changes</button>
                </form>
            </div>

            <div class="card" id="verification">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="color: var(--must-blue);">Pending Submissions</h3>
                    <input type="text" id="filterInput" class="search-bar" placeholder="Filter by Reg ID or Name..."
                        onkeyup="filterSubmissions()">
                </div>
                <div id="pending-list"></div>
            </div>

            <div class="card" style="margin-top: 30px;">
                <h3 style="color: var(--must-blue);">Verification History</h3>
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Student Details</th>
                            <th>Achievement</th>
                            <th>Status</th>
                            <th>Remarks</th>
                            <th>Evidence</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body"></tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="js/teacher.js"></script>
</body>

</html>
